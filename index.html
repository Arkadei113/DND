<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Защищённая страница</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="js/check.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        #passwordForm { max-width: 300px; margin: 0 auto; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        #content { display: none; margin-top: 50px; }
        .links { list-style: none; padding: 0; }
        .links li { margin: 10px 0; }
        .links a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div id="passwordForm">
        <h2>Введите пароль для доступа</h2>
        <input type="password" id="passwordInput" placeholder="Пароль">
        <br>
        <button onclick="checkPassword()">Войти</button>
        <p id="error" style="color: red; display: none;">Неверный пароль!</p>
    </div>

    <div id="content">
        <h1>Переход на другие страницы</h1>
        <ul class="links">
            <li><a href="письма-рат.html">Письма Рат</a></li>
            <li><a href="письма-резмир.html">Письма резмир</a></li>
            <li><a href="дневник-рат.html">Дневник Рат</a></li>
            <li><a href="дневник-резмир.html">Дневник Резмир</a></li>
            <li><a href="дневник-сандесиль-моргия.html">Дневник Сандесиль Моргия</a></li>
        </ul>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (!input) {
                showError();
                return;
            }

            const inputHash = CryptoJS.SHA256(input).toString();
            const expectedHash = getExpectedHash(); 

            if (inputHash === expectedHash) {
                document.getElementById('passwordForm').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('passwordInput').value = ''; // Очистка поля
            } else {
                showError();
            }
        }

        function showError() {
            document.getElementById('error').style.display = 'block';
            setTimeout(() => { document.getElementById('error').style.display = 'none'; }, 3000);
        }

        // Пароль требуется каждый раз
        window.onload = function() {
            document.getElementById('passwordForm').style.display = 'block';
            document.getElementById('content').style.display = 'none';
        };
    </script>
</body>
</html>
