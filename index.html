<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Защищённая страница</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="check.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #passwordForm { max-width: 300px; margin: 0 auto; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; }
        .button-link {
            display: inline-block;
            padding: 15px 30px;
            margin: 10px;
            text-decoration: none;
            color: white;
            background-color: #007bff;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .button-link:hover {
            background-color: #0056b3;
        }
        #content { display: none; margin-top: 50px; }
    </style>
</head>
<body>
    <div id="passwordForm">
        <h2>Введите пароль для доступа</h2>
        <input type="password" id="passwordInput" placeholder="Пароль">
        <br>
        <button onclick="checkPassword()">Войти</button>
        <p id="error" style="color: red; display: none;">Неверный пароль!</p>
    </div>

    <div class="container">
        <h1>Переход на другие страницы</h1>
        <a href="Letters from Rath.html" class="button-link">Письма Рат</a>
        <a href="Letters from Rezmir.html" class="button-link">Письма резмир</a>
        <a href="Rath's Diary.html" class="button-link">Дневник Рат</a>
        <a href="Rezmir's Diary.html" class="button-link">Дневник Резмир</a>
        <a href="Sandesil Morgue's Diary.html" class="button-link">Дневник Сандесиль Моргия</a>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (!input) {
                showError();
                return;
            }

            const inputHash = CryptoJS.SHA256(input).toString();
            console.log('Введённый хеш:', inputHash); // Для отладки
            console.log('Ожидаемый хеш:', getExpectedHash()); // Для отладки

            if (inputHash === getExpectedHash()) {
                document.getElementById('passwordForm').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('passwordInput').value = ''; // Очистка поля
            } else {
                showError();
            }
        }

        function showError() {
            document.getElementById('error').style.display = 'block';
            setTimeout(() => { document.getElementById('error').style.display = 'none'; }, 3000);
        }

        window.onload = function() {
            document.getElementById('passwordForm').style.display = 'block';
            document.getElementById('content').style.display = 'none';
        };
    </script>
</body>
</html>
